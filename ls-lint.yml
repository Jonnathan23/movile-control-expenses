ls:
    # Regla maestra: Abarca todo el código fuente en tus apps y packages
    "src/**":
        .dir: kebab-case
        .ts: kebab-case
        .tsx: kebab-case

        # Específicos de Frontend (React / TanStack)
        .hook.ts: kebab-case
        .page.tsx: kebab-case
        .layout.tsx: kebab-case
        .adapter.ts: kebab-case
        .schema.ts: kebab-case

        # Capa Domain
        .dto.ts: kebab-case
        .model.ts: kebab-case
        .projection.ts: kebab-case
        .interface.ts: kebab-case
        .datasource.ts: kebab-case
        .repository.ts: kebab-case

        # Capa Infrastructure
        .datasource.impl.ts: kebab-case
        .mapper.ts: kebab-case

        # Capa Application
        .use-case.ts: kebab-case

        # Capa Presentation
        .component.tsx: kebab-case
        .page.tsx: kebab-case
        .hook.ts: kebab-case
        .reducer.ts: kebab-case
        .context.tsx: kebab-case
        .context.ts: kebab-case
        .provider.tsx: kebab-case
        .store.ts: kebab-case
ignore:
    - node_modules
    - .git
    - dist
    - build
    - docs
    - .vscode
    - scripts
    - .agents
    - __test__
    - __tests__
    - .env.local
    - .env.template
    - vite.config.ts
    - "*.json"
    - .wakatime-project
    - "main.tsx"
    - "**/main.tsx"