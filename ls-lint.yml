ls:

  # Capa Domain
  "src/**/dtos/**":
    .ts: regex:^[a-z0-9-]+.dto$
  "src/**/entities/**":
    .ts: regex:^[a-z0-9-]+.entity$
  "src/**/interfaces/**":
    .ts: regex:^[a-z0-9-]+.interface$
  "src/**/repositories/**":
    .ts: regex:^[a-z0-9-]+.repository$
  "src/**/datasources/**":
    .ts: regex:^[a-z0-9-]+.datasource$

  # Capa Infrastructure
  "src/**/mappers/**":
    .ts: regex:^[a-z0-9-]+.mapper$

  # Capa Application (Casos de uso)
  "src/**/use-cases/**":
    .ts: regex:^[a-z0-9-]+.use-case$

  # Capa Presentation / Frontend
  "src/**/pages/**":
    .tsx: regex:^[a-z0-9-]+.page$
  "src/**/hooks/**":
    .ts: regex:^[a-z0-9-]+.hook$
  "src/**/context/**":
    .tsx: regex:^[a-z0-9-]+.context$
    .ts: regex:^[a-z0-9-]+.context$
  "src/**/stores/**":
    .ts: regex:^[a-z0-9-]+.store$
  "src/**/reducers/**":
    .ts: regex:^[a-z0-9-]+.reducer$

  "src/**":
    .dir: kebab-case
    .ts: kebab-case
    .tsx: kebab-case

ignore:
  - node_modules
  - .git
  - dist
  - build
  - docs
  - .vscode
  - scripts
  - .agents
  - __test__
  - __tests__
  - .env.local
  - .env.template
  - vite.config.ts
  - "*.json"
  - .wakatime-project
  - "main.tsx"
  - "App.tsx"